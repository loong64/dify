name: Build and Push API & Web

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: ''
  schedule:
    - cron: '0 20 * * *'

concurrency:
  group: build-push-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build: ${{ steps.check-build.outputs.build }}
    steps:
      - name: Check Version
        id: get-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(curl -s 'https://api.github.com/repos/langgenius/dify/releases/latest' | jq -r ".tag_name")
          fi
          echo "Current Version: ${version}"
          if [ -z "${version}" ] || [ "${version}" == "null" ]; then
            echo "Failed to get version"
            exit 1
          fi
          echo "version=${version}" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Check Build
        id: check-build
        run: |
          gh release view ${version} -R ${{ github.repository }} >/dev/null 2>&1 || echo "build=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.build == '1'
    env:
      version: ${{ needs.check.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: "build-api-loong64"
            image_name_env: "langgenius/dify-api"
            artifact_context: "api"
            context: "api"
            file: "api/Dockerfile"
            platform: linux/loong64
          - service_name: "build-web-loong64"
            image_name_env: "langgenius/dify-web"
            artifact_context: "web"
            context: "."
            file: "web/Dockerfile"
            platform: linux/loong64

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: langgenius/dify
          ref: ${{ env.version }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Patch
        run: |
          set -ex
          wget -qO - https://github.com/loong64/dify/raw/refs/heads/main/patch_loong64.patch | patch -p1

          if [ "${{ matrix.artifact_context }}" = "api" ]; then
            PYTHON_VERSION="$(sed -n 's/.*python:\([0-9]*\.[0-9]*\).*/\1/p' api/Dockerfile)"
            cd api
            rm -f uv.lock
            docker run --rm \
              --platform=linux/loong64 \
              --env PIP_EXTRA_INDEX_URL=https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple \
              --env UV_EXTRA_INDEX_URL=https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple \
              --volume $(pwd):/app/api \
              --workdir /app/api \
              ghcr.io/loong64/python:${PYTHON_VERSION}-slim-trixie \
              sh -c "pip install uv && uv lock"
            cd -
          fi
          if [ "${{ matrix.artifact_context }}" = "web" ]; then
            NODE_VERSION="$(sed -n 's/.*node:\([0-9]*\).*/\1/p' web/Dockerfile)"
            VITE_PLUS_VERSION=0.1.20
            LIGHTNINGCSS_VERSION=1.32.0
            TAILWINDCSS_VERSION=4.2.4
            NEXT_VERSION=16.2.6
            docker run --rm \
              --platform=linux/loong64 \
              --volume $(pwd):/app \
              --workdir /app \
              ghcr.io/loong64/node:${NODE_VERSION}-alpine \
              sh -c "apk add --no-cache git tzdata && corepack enable && corepack install && \
              pnpm add -w \
                https://github.com/loong64/vite-plus/releases/download/v${VITE_PLUS_VERSION}/voidzero-dev-vite-plus-linux-loong64-musl-${VITE_PLUS_VERSION}.tgz \
                https://github.com/loong64/vite-plus/releases/download/v${VITE_PLUS_VERSION}/voidzero-dev-vite-plus-cli-linux-loong64-musl-${VITE_PLUS_VERSION}.tgz && \
              pnpm add -w \
                https://github.com/loong64/lightningcss/releases/download/v${LIGHTNINGCSS_VERSION}/lightningcss-linux-loong64-musl-${LIGHTNINGCSS_VERSION}.tgz \
                https://github.com/loong64/lightningcss/releases/download/v${LIGHTNINGCSS_VERSION}/lightningcss-cli-linux-loong64-musl-${LIGHTNINGCSS_VERSION}.tgz && \
              pnpm add -w \
                https://github.com/loong64/tailwindcss/releases/download/v${TAILWINDCSS_VERSION}/tailwindcss-oxide-linux-loong64-musl.tgz && \
              pnpm add -w \
                https://github.com/loong64/next.js/releases/download/v${NEXT_VERSION}/next-swc-linux-loong64-musl-${NEXT_VERSION}.tgz \
                https://github.com/loong64/next.js/releases/download/v${NEXT_VERSION}/next-mdx-${NEXT_VERSION}.tgz \
                https://github.com/loong64/next.js/releases/download/v${NEXT_VERSION}/next-eslint-plugin-next-${NEXT_VERSION}.tgz \
              https://github.com/loong64/next.js/releases/download/v${NEXT_VERSION}/next-${NEXT_VERSION}.tgz"
          fi
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: "${{ matrix.context }}"
          file: "${{ matrix.file }}"
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            COMMIT_SHA=${{ env.COMMIT_SHA }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name_env }}:${{ env.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name_env }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-slim
    needs: [ check, build ]
    if: needs.check.outputs.build == '1'
    env:
      version: ${{ needs.check.outputs.version }}
    steps:
      - name: Check Version
        run: |
          echo "Current Version: ${version}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.version }}
          tag_name: ${{ env.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}